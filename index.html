<!DOCTYPE html>
<html>
<head>
<title>Happy 1 Month ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to bottom,#ff9ecf,#ffd6e8);
    font-family:Arial,sans-serif;
    text-align:center;
    color:white;
}

h1{
    margin-top:100px;
    font-size:50px;
}

p{
    font-size:22px;
}

.heart{
    position:fixed;
    color:red;
    font-size:25px;
    animation:fall linear infinite;
    top:-10%;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh);
    }
    100%{
        transform:translateY(110vh);
    }
}
</style>

</head>
<body>

<h1>❤️ Happy 1 Month ❤️</h1>

<p>
Even though we're far apart,<br>
you make every day special.<br><br>

I love you ❤️
</p>

<script>
for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";
heart.className="heart";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*30)+"px";

document.body.appendChild(heart);

}
</script>

</body>
</html>
